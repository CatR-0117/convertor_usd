<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="box">
          <label>From</label>
          <div class="input-group">
            <input type="number" id="usd" value="0" />
            <span class="symbol">$</span>
          </div>
          <div class="dropdown">
            <div class="dropdown-btn" id="dropdownBtn">
              <div class="left">
                <img id="logo" src="./csfloat.png" />
                <span id="selectedText">CSFloat</span>
              </div>
              <span class="arrow">▼</span>
            </div>
            <div class="dropdown-content" id="dropdownMenu">
              <div class="dropdown-item" data-value="csfloat" data-rate="3550">
                <img src="./csfloat.png" />CsFloat
              </div>
              <div class="dropdown-item" data-value="steam" data-rate="2800 ">
                <img src="./images.jpg" />Steam
              </div>
            </div>
          </div>
        </div>
        <div class="box">
          <label>To</label>
          <div class="input-group">
            <input type="number" id="mnt" readonly />
            <span class="symbol">₮</span>
          </div>
        </div>
      </div>
      <div class="result">1 USD = <span id="rateText"></span> ₮</div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
